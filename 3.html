<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站 - 联系我</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">我的网站</a>
            <button class="menu-btn" id="menuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我</a></li>
                <li><a href="contact.html" class="active">联系我</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact">
        <div class="container">
            <h2>联系我</h2>
            <div class="contact-content">
                <!-- 联系表单 -->
                <div class="contact-form">
                    <h3>发送消息</h3>
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="name">姓名</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">消息</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn">发送</button>
                    </form>
                </div>
                <!-- 联系信息 -->
                <div class="contact-info">
                    <h3>联系方式</h3>
                    <ul>
                        <li><i class="fas fa-envelope"></i> example@mail.com</li>
                        <li><i class="fas fa-phone"></i> 123-4567-8901</li>
                        <li><i class="fas fa-map-marker-alt"></i> 北京市某某区某某路123号</li>
                    </ul>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-weixin"></i></a>
                        <a href="#"><i class="fab fa-github"></i></a>
                        <a href="#"><i class="fab fa-weibo"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 我的个人网站 | 保留所有权利</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
